<!DOCTYPE html>
<html lang="en">
<head>
    <title>Unlock Landing Page</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Akshar:wght@700&family=Almendra:wght@400&family=Poppins:wght@400&display=swap" rel="stylesheet">

    <style>
        /* Reset default styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Navigation Bar */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 40px;
            background-color: white;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            height: 65px;
        }

        .logo img {
            height: 70px;
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        .nav-links li {
            display: inline;
        }

        .nav-links a {
            text-decoration: none;
            color: black;
            font-size: 18px;
            font-family: 'Almendra', serif;
            padding: 10px 15px;
            position: relative;
            transition: color 0.3s;
        }

        .nav-links a.current::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15px;
            right: 15px;
            height: 3px;
            background-color: #e5015c;
            border-radius: 3px;
        }

        /* Pink hover effect */
        .nav-links a:hover {
            color: #e5015c;
        }

        /* Login/Signup Buttons */
        .auth-buttons {
            display: flex;
            gap: 10px;
        }

        .login-btn, .signup-btn {
            background-color: yellow;
            color: black;
            padding: 8px 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .login-btn:hover, .signup-btn:hover {
            background-color: #ffeb3b; /* Slightly darker yellow on hover */
            transform: translateY(-2px);
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(to right, #81d4fa, #fff59d);
            text-align: center;
            padding: 150px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hero h1 {
            font-size: 100px;
            font-family: 'Akshar', sans-serif;
            color: #1a237e;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 50px;
            font-family: 'Almendra', serif;
            color: #3b235a;
            text-align: center;
            max-width: 600px;
        }

        /* Get Started Button */
        .get-started-btn {
            background-color: #e5015c;
            color: white;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            display: inline-block;
        }

        .get-started-btn:hover {
            background-color: #c4004e;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">
            <a href="home.html"><img src="C:\Users\Lenovo\OneDrive\Pictures\logo.png" alt="Unlock Logo"></a>
        </div>
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="home.html" class="current">Home</a></li>
                <li><a href="mentor_list.html">Mentors</a></li>
                <li><a href="alumni_list.html">Alumni</a></li>
                <li><a href="user.html">Profile</a></li>
            </ul>
        </div>
    </nav>    

    <!-- Hero Section -->
    <section class="hero">
        <h1>Unlock</h1>
        <p>your true potential with us</p>
        <a href="signup.html" class="get-started-btn">Get Started</a>
    </section>
</body>
</html>
