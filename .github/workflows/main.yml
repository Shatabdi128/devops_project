name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check if index.html exists
        run: |
          if [ -f index.html ]; then
            echo "File exists "
          else
            echo "File missing "
            exit 1
          fi

      - name: Check file content
        run: |
          if grep -q "DevOps" index.html; then
            echo "Content check passed "
          else
            echo "Content missing "
            exit 1
          fi