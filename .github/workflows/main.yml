name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check if index.html exists
        run: |
          if [ -f index.html ]; then
            echo "File exists "
          else
            echo "File missing "
            exit 1
          fi

      - name: Check file content
        run: |
          if grep -q "Unlock" index.html; then
            echo "Content check passed "
          else
            echo "Content missing git add ."
            exit 1
          fi

      - name: Check file is not empty
        run: |
          if [ -s index.html ]; then
            echo "File is not empty"
          else
            echo "File is empty"
            exit 1
          fi

      - name: Check title tag
        run: |
          if grep -q "<title>" index.html; then
            echo "Title tag found"
          else
            echo "Title missing"
            exit 1
          fi